<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" preserveAspectRatio="xMidYMid slice">
  <!-- Stylized city map background for the tour preview prototype -->
  <rect width="1000" height="660" fill="#E9EEF4"/>

  <!-- city blocks tint -->
  <rect x="0" y="0" width="1000" height="660" fill="#EDF2F7"/>

  <!-- river -->
  <path d="M -20 520 C 180 470 320 560 520 530 C 720 500 820 590 1020 545 L 1020 680 L -20 680 Z" fill="#BFD8F0"/>
  <path d="M -20 540 C 180 490 320 580 520 550 C 720 520 820 610 1020 565" fill="none" stroke="#A9CBEA" stroke-width="6" opacity="0.6"/>

  <!-- parks -->
  <ellipse cx="150" cy="130" rx="95" ry="60" fill="#CFE5C8"/>
  <ellipse cx="835" cy="150" rx="110" ry="70" fill="#CFE5C8"/>
  <ellipse cx="520" cy="380" rx="80" ry="48" fill="#D8EAD0"/>
  <ellipse cx="300" cy="300" rx="55" ry="34" fill="#D8EAD0"/>

  <!-- minor street grid -->
  <g stroke="#FFFFFF" stroke-width="5">
    <line x1="0" y1="80"  x2="1000" y2="60"/>
    <line x1="0" y1="170" x2="1000" y2="150"/>
    <line x1="0" y1="260" x2="1000" y2="245"/>
    <line x1="0" y1="350" x2="1000" y2="340"/>
    <line x1="0" y1="440" x2="1000" y2="430"/>
    <line x1="90"  y1="0" x2="110" y2="660"/>
    <line x1="230" y1="0" x2="245" y2="660"/>
    <line x1="380" y1="0" x2="390" y2="660"/>
    <line x1="530" y1="0" x2="535" y2="660"/>
    <line x1="680" y1="0" x2="685" y2="660"/>
    <line x1="840" y1="0" x2="845" y2="660"/>
  </g>

  <!-- secondary diagonals -->
  <g stroke="#FFFFFF" stroke-width="4" opacity="0.9">
    <line x1="0" y1="620" x2="620" y2="0"/>
    <line x1="330" y1="660" x2="1000" y2="90"/>
  </g>

  <!-- major artery with casing -->
  <path d="M -20 470 C 200 420 420 460 620 400 C 800 350 900 260 1020 240" fill="none" stroke="#E3B93F" stroke-width="14" opacity="0.35"/>
  <path d="M -20 470 C 200 420 420 460 620 400 C 800 350 900 260 1020 240" fill="none" stroke="#F6D479" stroke-width="8"/>

  <!-- highway -->
  <path d="M 60 -20 C 120 180 80 400 180 660" fill="none" stroke="#E3B93F" stroke-width="12" opacity="0.35"/>
  <path d="M 60 -20 C 120 180 80 400 180 660" fill="none" stroke="#F6D479" stroke-width="7"/>

  <!-- bridge over river -->
  <line x1="530" y1="500" x2="535" y2="600" stroke="#FFFFFF" stroke-width="7"/>
  <line x1="530" y1="500" x2="535" y2="600" stroke="#D9C08A" stroke-width="3" opacity="0.7"/>

  <!-- subtle block shadows for depth -->
  <g fill="#DEE6EE" opacity="0.55">
    <rect x="120" y="190" width="90" height="52" rx="4"/>
    <rect x="410" y="90" width="100" height="58" rx="4"/>
    <rect x="560" y="180" width="95" height="50" rx="4"/>
    <rect x="700" y="290" width="110" height="55" rx="4"/>
    <rect x="260" y="470" width="95" height="50" rx="4"/>
    <rect x="620" y="470" width="90" height="48" rx="4"/>
    <rect x="880" y="380" width="90" height="52" rx="4"/>
  </g>
</svg>
