<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immocontact — Tour de visites</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <img src="assets/logo.svg" alt="Immocontact" width="185" height="31">
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-bottom">
      <a href="#" class="nav-item nav-item--muted" data-nav="logout">
        <span class="nav-icon"><img src="assets/menu/logout.svg" alt=""></span>
        Déconnexion
      </a>
      <div class="sidebar-flag">
        <img src="assets/flag.svg" alt="" width="25" height="28">
        <span>Fièrement<br>canadien</span>
      </div>
    </div>
  </aside>

  <div class="main-col">
    <!-- Mobile header, menu screen variant: logo + logout -->
    <header class="mobile-header mobile-header--menu">
      <span class="mobile-logo"><img src="assets/logo.svg" alt="Immocontact"></span>
      <button class="mobile-power" data-nav="logout" title="Déconnexion">
        <img src="assets/menu/power.svg" alt="" width="32" height="31">
      </button>
    </header>

    <!-- Mobile header, inner pages variant: back + page title + menu grid -->
    <header class="mobile-header mobile-header--nav">
      <button class="mobile-nav-back" id="mobile-back-btn" title="Retour">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 4l-8 8 8 8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="mobile-nav-title" id="mobile-nav-title">Tour de visites</span>
      <button class="mobile-nav-grid" id="mobile-menu-btn" title="Menu">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="9.5" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
          <rect x="3" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/><rect x="16" y="9.5" width="5" height="5" rx="1"/>
          <rect x="3" y="16" width="5" height="5" rx="1"/><rect x="9.5" y="16" width="5" height="5" rx="1"/><rect x="16" y="16" width="5" height="5" rx="1"/>
        </svg>
      </button>
    </header>
    <header class="topbar">
      <h1 class="topbar-title" id="topbar-title">Tour de visites</h1>
      <div class="user-info">
        <img class="user-avatar" src="assets/avatar.png" alt="" width="30" height="30">
        <span class="user-name">Nadia Ciancotti</span>
      </div>
    </header>

    <main class="content" id="main-content">
      <!-- injected by app.js -->
    </main>

    <footer class="mobile-footer">
      <img class="mobile-footer-flag-lockup" src="assets/menu/flag-canadien.svg" alt="Fièrement Canadien" width="100" height="28">
      <p class="mobile-footer-brand">Propulsé par Touchbase Real Estate</p>
    </footer>
  </div>

</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/app.js"></script>
</body>
</html>
